<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des Catégories</title>

    <!-- Bootstrap 5 via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/categories.css}">

</head>
<body>
<header>
    <!-- NAVBAR avec Bootstrap -->
    <nav class="navbar navbar-expand-lg bg-white shadow-sm px-4">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" th:href="@{/home}">
                <img alt="Climbing Club" th:src="@{/images/logo.png}" style="height: 40px; margin-right: 10px;">
                <span>Climbing Club</span>
            </a>

            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav mb-2 mb-lg-0">

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/home}">Accueil</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/categories}">Catégories</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#upcoming-section">Sorties à venir</a>
                    </li>

                    <!-- Visible uniquement si l'utilisateur est connecté -->
                    <li class="nav-item" th:if="${#authorization.expression('isAuthenticated()')}">
                        <a class="nav-link" th:href="@{/dashboard}">Tableau de bord</a>
                    </li>

                    <!-- Déconnexion (authentifié) -->
                    <li class="nav-item" th:if="${#authorization.expression('isAuthenticated()')}">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button class="btn btn-outline-danger btn-sm ms-2" type="submit">Déconnexion</button>
                        </form>
                    </li>

                    <!-- Connexion (non-authentifié) -->
                    <li class="nav-item" th:unless="${#authorization.expression('isAuthenticated()')}">
                        <a class="nav-link" th:href="@{/login}">Connexion</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>
<main>
    <!-- Barre de recherche -->
    <div class="container">
        <form th:action="@{/search}" method="get" class="search-form d-flex">
            <input type="text" name="q" class="form-control me-2" placeholder="Rechercher une sortie..." required>
            <button type="submit" class="btn btn-success">Rechercher</button>
        </form>
    </div>

    <!-- Titre principal -->
    <h1>Catégories d'escalade</h1>

    <!-- Liste des catégories -->
    <div class="container category-list">
        <div class="row justify-content-center g-3">
            <div class="col-md-4" th:each="cat : ${categories}">
                <div class="card shadow-sm text-center p-3">
                    <h5 th:text="${cat.name}">Nom Catégorie</h5>
                    <a th:href="@{/categories/{id}(id=${cat.id})}" class="btn btn-outline-primary mt-2">Voir les sorties</a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="bg-light text-center py-4 mt-auto">
    © 2025 Climbing Club. Tous droits réservés.
</footer>

</body>
</html>
