<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mot de passe oublié</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/forgot-password.css}">
</head>
<body>

<div class="forgot-container">
    <h1>Mot de passe oublié</h1>

    <form th:action="@{/forgot-password}" method="post">
        <div class="mb-3">
            <label for="email" class="form-label">Email :</label>
            <input type="email" class="form-control" id="email" name="email" required />
        </div>

        <button type="submit" class="btn btn-primary w-100">Envoyer le lien de réinitialisation</button>
    </form>

    <div th:if="${message}" class="message">
        <p th:text="${message}"></p>
    </div>

    <div th:if="${error}" class="error">
        <p th:text="${error}"></p>
    </div>

    <div class="link">
        <a th:href="@{/login}">⬅ Retour à la connexion</a>
    </div>
</div>

</body>
</html>
