<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div class="login-container">
    <h1>Connexion au Climbing Club</h1>

    <div th:if="${param.resetSuccess}" class="alert alert-success">
        ✅ Votre mot de passe a été réinitialisé avec succès. Veuillez vous connecter.
    </div>
    <div th:if="${param.logout}" class="alert alert-success">
        ✅ Vous avez été déconnecté avec succès.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label">Email :</label>
            <input type="text" class="form-control" name="username" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Mot de passe :</label>
            <input type="password" class="form-control" name="password" required />
        </div>

        <button type="submit" class="btn btn-primary w-100">Se connecter</button>
    </form>

    <div th:if="${param.error}" class="alert alert-danger mt-3">
        ❌ Email ou mot de passe incorrect.
    </div>

    <div class="link">
        <a th:href="@{/register}">Pas encore inscrit ? Créer un compte</a><br>
        <a th:href="@{/forgot-password}">Mot de passe oublié ?</a>
        <div class="visitor-access mt-3">
            <a th:href="@{/home}" class="btn btn-outline-secondary access-btn">Accès visiteur</a>
        </div>
    </div>
</div>

</body>
</html>
