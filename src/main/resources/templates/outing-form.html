<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nouvelle sortie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel=" stylesheet" th:href="@{/css/outing-form.css}">
</head>
<body>
<header>
    <!-- NAVBAR avec Bootstrap -->
    <nav class="navbar navbar-expand-lg bg-white shadow-sm px-4">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" th:href="@{/home}">
                <img alt="Climbing Club" th:src="@{/images/logo.png}" style="height: 40px; margin-right: 10px;">
                <span>Climbing Club</span>
            </a>

            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav mb-2 mb-lg-0">

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/home}">Accueil</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/categories}">Catégories</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#upcoming-section">Sorties à venir</a>
                    </li>

                    <!-- Visible uniquement si l'utilisateur est connecté -->
                    <li class="nav-item" th:if="${#authorization.expression('isAuthenticated()')}">
                        <a class="nav-link" th:href="@{/dashboard}">Tableau de bord</a>
                    </li>

                    <!-- Déconnexion (authentifié) -->
                    <li class="nav-item" th:if="${#authorization.expression('isAuthenticated()')}">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button class="btn btn-outline-danger btn-sm ms-2" type="submit">Déconnexion</button>
                        </form>
                    </li>

                    <!-- Connexion (non-authentifié) -->
                    <li class="nav-item" th:unless="${#authorization.expression('isAuthenticated()')}">
                        <a class="nav-link" th:href="@{/login}">Connexion</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>
<main>
    <div class="form-container">
        <h1 th:text="${outing.id == null ? 'Créer une sortie' : 'Modifier la sortie'}"></h1>

        <form th:action="@{/outings}" th:object="${outing}" method="post">
            <div class="mb-3">
                <label for="name">Nom :</label>
                <input id="name" type="text" th:field="*{name}" required/>
            </div>

            <div class="mb-3">
                <label for="description">Description :</label>
                <textarea id="description" th:field="*{description}" required></textarea>
            </div>

            <div class="mb-3">
                <label for="date">Date :</label>
                <input id="date" type="date" th:field="*{date}" required/>
            </div>

            <div class="mb-3">
                <label for="website">Site web :</label>
                <input id="website" type="url" th:field="*{website}" placeholder="https://..." />
            </div>

            <div class="mb-3">
                <label for="category">Catégorie :</label>
                <select id="category" th:field="*{category}" required>
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                </select>
            </div>

            <input type="hidden" th:field="*{id}" />

            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">💾 Enregistrer</button>
            </div>
        </form>

        <a th:href="@{/dashboard}" class="back-link">⬅ Retour au tableau de bord</a>
    </div>
</main>
<footer class="bg-light text-center py-4 mt-auto">
    © 2025 Climbing Club. Tous droits réservés.
</footer>

</body>
</html>
